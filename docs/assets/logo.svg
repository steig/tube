<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="tubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#tubeGradient)" filter="url(#shadow)"/>

  <!-- Outer tube ring -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="#fff" stroke-width="8" opacity="0.9"/>

  <!-- Inner tube opening -->
  <circle cx="60" cy="60" r="25" fill="url(#innerGradient)"/>

  <!-- Data flow arrows (stylized) -->
  <g fill="#fff" opacity="0.9">
    <!-- Arrow 1 - pointing down into tube -->
    <path d="M60 30 L55 40 L58 40 L58 48 L62 48 L62 40 L65 40 Z"/>

    <!-- Arrow 2 - pointing right out of tube -->
    <path d="M72 60 L82 55 L82 58 L90 58 L90 62 L82 62 L82 65 Z"/>
  </g>

  <!-- Connection dots -->
  <circle cx="60" cy="60" r="6" fill="#fff"/>

  <!-- Small indicator dots around the ring -->
  <circle cx="60" cy="20" r="3" fill="#10B981"/>
  <circle cx="100" cy="60" r="3" fill="#10B981"/>
  <circle cx="60" cy="100" r="3" fill="#6B7280"/>
  <circle cx="20" cy="60" r="3" fill="#6B7280"/>
</svg>
