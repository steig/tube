version: "2"

run:
  timeout: 5m

linters:
  default: standard

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: internal/gui/
        linters:
          - errcheck

  settings:
    errcheck:
      exclude-functions:
        - (*os/exec.Cmd).Run
        - (*os/exec.Cmd).Start
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - os.Setenv
        - os.Chdir
        - os.RemoveAll
