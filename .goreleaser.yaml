version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  # CLI binary — pure Go, cross-compiles cleanly to every target.
  - id: tube
    main: ./cmd/tube
    binary: tube
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.CommitDate}}

  # GUI (menu bar app) — needs CGO for the systray Objective-C bindings, so
  # it's darwin-only and the release workflow has to run on a macOS runner.
  - id: tube-gui
    main: ./cmd/tube-gui
    binary: tube-gui
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: tube
    name_template: "tube_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Include both binaries when present. goreleaser packs every output of the
    # listed builds into the archive that matches goos/goarch — so linux and
    # windows archives stay tube-only (since tube-gui has no build for them),
    # while darwin archives get both.
    builds:
      - tube
      - tube-gui
    # darwin archives intentionally contain 2 binaries, linux/windows just 1.
    # Without this opt-in goreleaser refuses asymmetric archives.
    allow_different_binary_count: true
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md

# Homebrew tap publishing disabled until homebrew-tube repo is created
# and HOMEBREW_TAP_TOKEN secret is configured
# brews:
#   - name: tube
#     repository:
#       owner: steig
#       name: homebrew-tube
#       token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
#     directory: Formula
#     homepage: https://github.com/steig/tube
#     description: Local development proxy with .test domains and Cloudflare tunnels
#     license: MIT
#     install: |
#       bin.install "tube"
#     test: |
#       assert_match version.to_s, shell_output("#{bin}/tube --version")

nfpms:
  - id: tube
    package_name: tube
    vendor: Steig Sørensen
    homepage: https://github.com/steig/tube
    maintainer: Steig Sørensen <steig@example.com>
    description: Local development proxy with .test domains and Cloudflare tunnels
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    contents:
      - src: ./README.md
        dst: /usr/share/doc/tube/README.md
      - src: ./LICENSE
        dst: /usr/share/doc/tube/LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  prerelease: auto
  footer: |
    ## Installation

    ### One-line install script (recommended)

    Detects your OS/arch, verifies the SHA256 against the published
    `checksums.txt`, and installs `tube` to `/usr/local/bin`:

    ```bash
    curl -fsSL https://raw.githubusercontent.com/steig/tube/main/scripts/install.sh | sh
    ```

    Pin this release explicitly:

    ```bash
    curl -fsSL https://raw.githubusercontent.com/steig/tube/main/scripts/install.sh \
      | TUBE_VERSION={{ .Tag }} sh
    ```

    Install without sudo (e.g. to `~/.local/bin`):

    ```bash
    curl -fsSL https://raw.githubusercontent.com/steig/tube/main/scripts/install.sh \
      | TUBE_PREFIX="$HOME/.local" sh
    ```

    ### Manual download

    Grab the archive for your platform from the assets above and extract the
    `tube` binary into a directory on your `PATH`. Verify against
    `checksums.txt` first.

    ### Linux packages

    `.deb`, `.rpm`, and `.apk` packages are published for `amd64` and
    `arm64` — install with your distro's package manager.

    ### From source

    ```bash
    git clone https://github.com/steig/tube.git
    cd tube
    make build-all
    sudo cp bin/tube bin/tube-gui /usr/local/bin/
    ```

    > **macOS menu bar app:** darwin archives now include `tube-gui` alongside
    > `tube`. Run `tube-gui` after installing for the menu bar icon.

    Full docs: <https://steig.github.io/tube/>
