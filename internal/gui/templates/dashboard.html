<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tube - Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { font-size: 2rem; font-weight: 600; }
        h1 span { color: #4ade80; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 9999px;
            font-size: 0.875rem; font-weight: 500;
        }
        .status-badge.running { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .status-badge.stopped { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .card h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; color: #94a3b8; }
        .services { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .service { display: flex; align-items: center; gap: 0.75rem; }
        .service .indicator { width: 12px; height: 12px; border-radius: 50%; }
        .service .indicator.running { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        .service .indicator.stopped { background: #64748b; }
        .service .name { font-weight: 500; }
        .service .status { color: #64748b; font-size: 0.875rem; }
        .controls { display: flex; gap: 1rem; margin-top: 1rem; }
        button {
            padding: 0.75rem 1.5rem; border: none; border-radius: 8px;
            font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        button.primary { background: #4ade80; color: #000; }
        button.primary:hover { background: #22c55e; }
        button.secondary { background: rgba(255, 255, 255, 0.1); color: #fff; }
        button.secondary:hover { background: rgba(255, 255, 255, 0.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .projects-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .project {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background: rgba(255, 255, 255, 0.03); border-radius: 8px;
        }
        .project-info { display: flex; align-items: center; gap: 1rem; }
        .project-info .indicator { width: 8px; height: 8px; border-radius: 50%; }
        .project-info .indicator.running { background: #4ade80; }
        .project-info .indicator.stopped { background: #64748b; }
        .project-name { font-weight: 500; }
        .project-url { color: #60a5fa; text-decoration: none; font-size: 0.875rem; }
        .project-url:hover { text-decoration: underline; }
        .project-port { color: #64748b; font-size: 0.875rem; }
        .project-actions button { padding: 0.5rem 1rem; font-size: 0.75rem; }
        .add-project { display: flex; gap: 0.5rem; margin-top: 1rem; }
        input {
            padding: 0.75rem 1rem; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; background: rgba(255, 255, 255, 0.05);
            color: #fff; font-size: 0.875rem;
        }
        input::placeholder { color: #64748b; }
        input:focus { outline: none; border-color: #4ade80; }
        .empty-state { text-align: center; padding: 2rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>tube</span> Dashboard</h1>
            <div id="overall-status" class="status-badge stopped">
                <span class="dot"></span>
                <span>Loading...</span>
            </div>
        </header>

        <div class="card">
            <h2>Services</h2>
            <div class="services">
                <div class="service">
                    <div class="indicator" id="nginx-indicator"></div>
                    <div>
                        <div class="name">nginx</div>
                        <div class="status" id="nginx-status">checking...</div>
                    </div>
                </div>
                <div class="service">
                    <div class="indicator" id="dnsmasq-indicator"></div>
                    <div>
                        <div class="name">dnsmasq</div>
                        <div class="status" id="dnsmasq-status">checking...</div>
                    </div>
                </div>
            </div>
            <div class="controls">
                <button class="primary" id="start-btn" onclick="startServices()">Start Services</button>
                <button class="secondary" id="stop-btn" onclick="stopServices()">Stop Services</button>
            </div>
        </div>

        <div class="card">
            <h2>Projects</h2>
            <div class="projects-list" id="projects-list">
                <div class="empty-state">Loading projects...</div>
            </div>
            <div class="add-project">
                <input type="text" id="new-name" placeholder="Project name" style="flex: 1;">
                <input type="number" id="new-port" placeholder="Port" style="width: 100px;">
                <button class="primary" onclick="addProject()">Add Project</button>
            </div>
        </div>
    </div>

    <script>
        // Build a project row safely via DOM APIs — no string concat into innerHTML
        // means project names can't break out of HTML or JS context even if the
        // server-side validation regex is ever loosened.
        function buildProjectRow(p) {
            const row = document.createElement('div');
            row.className = 'project';

            const info = document.createElement('div');
            info.className = 'project-info';
            const indicator = document.createElement('div');
            indicator.className = 'indicator ' + (p.running ? 'running' : 'stopped');
            const details = document.createElement('div');
            const name = document.createElement('div');
            name.className = 'project-name';
            name.textContent = p.name;
            const link = document.createElement('a');
            link.className = 'project-url';
            link.href = p.url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = p.url;
            details.appendChild(name);
            details.appendChild(link);
            info.appendChild(indicator);
            info.appendChild(details);

            const actions = document.createElement('div');
            actions.style.display = 'flex';
            actions.style.alignItems = 'center';
            actions.style.gap = '1rem';
            const port = document.createElement('span');
            port.className = 'project-port';
            port.textContent = ':' + p.port;
            const removeBtn = document.createElement('button');
            removeBtn.className = 'secondary project-actions';
            removeBtn.textContent = 'Remove';
            removeBtn.addEventListener('click', () => removeProject(p.name));
            actions.appendChild(port);
            actions.appendChild(removeBtn);

            row.appendChild(info);
            row.appendChild(actions);
            return row;
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                const nginxIndicator = document.getElementById('nginx-indicator');
                const nginxStatus = document.getElementById('nginx-status');
                nginxIndicator.className = 'indicator ' + (data.nginx.running ? 'running' : 'stopped');
                nginxStatus.textContent = data.nginx.status;

                const dnsmasqIndicator = document.getElementById('dnsmasq-indicator');
                const dnsmasqStatus = document.getElementById('dnsmasq-status');
                dnsmasqIndicator.className = 'indicator ' + (data.dnsmasq.running ? 'running' : 'stopped');
                dnsmasqStatus.textContent = data.dnsmasq.status;

                const overall = document.getElementById('overall-status');
                const allUp = data.nginx.running && data.dnsmasq.running;
                overall.className = 'status-badge ' + (allUp ? 'running' : 'stopped');
                overall.innerHTML = '';
                const dot = document.createElement('span');
                dot.className = 'dot';
                const label = document.createElement('span');
                label.textContent = allUp ? 'Running' : 'Stopped';
                overall.appendChild(dot);
                overall.appendChild(label);

                document.getElementById('start-btn').disabled = data.nginx.running && data.dnsmasq.running;
                document.getElementById('stop-btn').disabled = !data.nginx.running && !data.dnsmasq.running;
            } catch (e) {
                console.error('Failed to fetch status:', e);
            }
        }

        async function fetchProjects() {
            try {
                const res = await fetch('/api/projects');
                const projects = await res.json();

                const list = document.getElementById('projects-list');
                list.innerHTML = '';
                if (!projects || projects.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'empty-state';
                    empty.textContent = 'No projects configured. Add one below!';
                    list.appendChild(empty);
                    return;
                }
                projects.forEach(p => list.appendChild(buildProjectRow(p)));
            } catch (e) {
                console.error('Failed to fetch projects:', e);
            }
        }

        async function startServices() {
            try {
                await fetch('/api/services/start', { method: 'POST' });
                fetchStatus();
            } catch (e) {
                alert('Failed to start services: ' + e.message);
            }
        }

        async function stopServices() {
            try {
                await fetch('/api/services/stop', { method: 'POST' });
                fetchStatus();
            } catch (e) {
                alert('Failed to stop services: ' + e.message);
            }
        }

        async function addProject() {
            const name = document.getElementById('new-name').value.trim();
            const port = parseInt(document.getElementById('new-port').value);
            if (!name || !port) {
                alert('Please enter both name and port');
                return;
            }
            try {
                const res = await fetch('/api/project/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, port })
                });
                if (!res.ok) {
                    alert('Failed to add project: ' + (await res.text()));
                    return;
                }
                document.getElementById('new-name').value = '';
                document.getElementById('new-port').value = '';
                fetchProjects();
            } catch (e) {
                alert('Failed to add project: ' + e.message);
            }
        }

        async function removeProject(name) {
            if (!confirm('Remove project "' + name + '"?')) return;
            try {
                const res = await fetch('/api/project/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (!res.ok) {
                    alert('Failed to remove project: ' + (await res.text()));
                    return;
                }
                fetchProjects();
            } catch (e) {
                alert('Failed to remove project: ' + e.message);
            }
        }

        fetchStatus();
        fetchProjects();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
